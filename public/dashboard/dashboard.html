<!DOCTYPE html>
<html lang="pt-br">

<head>
    <link rel="shortcut icon" href="../assets/icon/favicon2.ico" type="image/x-icon">
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Upside Down | Dashboards</title>

    <link rel="stylesheet" href="./../css/dashboards.css">
    <link rel="stylesheet" href="./../css/estilo.css" />
    <script src="../js/sessao.js"></script>
    <script src="./../js/alerta.js"></script>

    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Exo+2:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script src="https://kit.fontawesome.com/9f7414eb10.js" crossorigin="anonymous"></script>
</head>

<body>

    <div class="janela">
        <div class="header-left">
            <h1>The Upside Down</h1>

            <div class="hello">
                <h3>Olá, <span id="b_usuario">usuário</span>!</h3>
            </div>

            <div class="btn-nav-white">
                <a href="../quiz.html">
                    <h3>Quiz</h3>
                </a>
            </div>

            <div class="btn-nav-white">
                <a href="./dashboard.html">
                    <h3>Dashboard</h3>
                </a>
            </div>

            <div class="btn-nav-white">
                <a href="./mural.html">
                    <h3>Mural de Curiosidades</h3>
                </a>
            </div>

            <div class="btn-nav-white">
                <a href="../index.html">
                    <h3>Voltar para a página Inicial</h3>
                </a>
            </div>

            <div class="btn-logout" onclick="limparSessao()">
                <h3>Sair</h3>
            </div>
        </div>

        <div class="dash">
            <div id="alerta"></div>

            <div class="btns-dash">
                <div style="display: flex; justify-content: center; width: 100%;">
                    <div
                        style="background-color: #212121; pading: 15px; border-radius: 10px; border: 2px solid #e50914; text-align: center; width: 300px; color: white; padding: 10px;">
                        <h4 style="margin: 0; font-size: 18px; text-transform: uppercase; letter-spacing: 1px;">Total de
                            Usuários Cadastrados</h4>
                        <p id="kpi_usuarios"
                            style="margin: 5px 0 0 0; font-size: 32px; font-weight: bold; color: #e50914;">Carregando...
                        </p>
                    </div>
                </div>
            </div>

            <div id="graficos"
                style="display: flex; flex-wrap: wrap; justify-content: space-around; gap: 20px; padding: 20px;">

                <div class="graph" style="width: 45%; background-color: #161616; padding: 20px; border-radius: 8px;">
                    <h3 style="color: white; text-align: center; margin-bottom: 15px;">Popularidade dos Personagens
                        (Votos)</h3>
                    <canvas id="grafico_personagens"></canvas>
                </div>

                <div class="graph" style="width: 45%; background-color: #161616; padding: 20px; border-radius: 8px;">
                    <h3 style="color: white; text-align: center; margin-bottom: 15px;">Desempenho Geral no Quiz</h3>
                    <canvas id="grafico_quiz"></canvas>
                </div>

            </div>
        </div>
    </div>

</body>

</html>

<script>
    b_usuario.innerHTML = sessionStorage.NOME_USUARIO;

    window.onload = function () {
        obterDadosDashboard();
    };

    function obterDadosDashboard() {
        fetch("/medidas/dashboard-dados", { cache: 'no-store' })
            .then(function (resposta) {
                if (resposta.ok) {
                    resposta.json().then(function (respostaJson) {
                        console.log(`Dados brutos recebidos: ${JSON.stringify(respostaJson)}`);

                        document.getElementById("kpi_usuarios").innerHTML = respostaJson.usuarios.totalUsuarios;

                        plotarGraficoPersonagens(respostaJson.personagens);
                        plotarGraficoQuiz(respostaJson.quiz);
                    });
                } else {
                    console.error('Nenhum dado encontrado ou erro na API');
                }
            })
            .catch(function (error) {
                console.error(`Erro na obtenção dos dados do Back-End: ${error.message}`);
            });
    }

    function plotarGraficoPersonagens(dadosPersonagens) {
        console.log('Iniciando plotagem do gráfico de personagens...');

        let labels = [];
        let dadosVotos = [];

        for (let i = 0; i < dadosPersonagens.length; i++) {
            let registro = dadosPersonagens[i];
            labels.push(`ID Personagem: ${registro.idPersonagemFavorito}`);
            dadosVotos.push(registro.totalVotos);
        }

        const ctx = document.getElementById('grafico_personagens').getContext('2d');
        new Chart(ctx, {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Quantidade de Votos',
                    data: dadosVotos,
                    backgroundColor: '#e50914',
                    borderColor: '#ffffff',
                    borderWidth: 1
                }]
            },
            options: {
                responsive: true,
                scales: {
                    y: {
                        beginAtZero: true,
                        ticks: { color: '#fff' }
                    },
                    x: {
                        ticks: { color: '#fff' }
                    }
                },
                plugins: {
                    legend: { labels: { color: '#fff' } }
                }
            }
        });
    }

    function plotarGraficoQuiz(dadosQuiz) {
        console.log('Iniciando plotagem do gráfico do quiz...');

        let mediaAcertos = dadosQuiz.mediaAcertos ? Number(dadosQuiz.mediaAcertos).toFixed(1) : 0;
        let mediaErros = dadosQuiz.mediaErros ? Number(dadosQuiz.mediaErros).toFixed(1) : 0;

        const ctx = document.getElementById('grafico_quiz').getContext('2d');
        new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['Média de Acertos', 'Média de Erros'],
                datasets: [{
                    data: [mediaAcertos, mediaErros],
                    backgroundColor: ['#2ecc71', '#c0392b'],
                    borderColor: '#161616',
                    borderWidth: 2
                }]
            },
            options: {
                responsive: true,
                plugins: {
                    legend: {
                        position: 'top',
                        labels: { color: '#fff' }
                    }
                }
            }
        });
    }
</script>
