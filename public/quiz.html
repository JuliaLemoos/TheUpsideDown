<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Stranger Things</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body onload="onloadEsconder()">
    <div id="pontuacaoEJogo">
        <button id="btnIniciarQuiz" onclick="iniciarQuiz()">INICIAR QUIZ</button>

        <div id="jogo" class="width-fit-content flex-colunar border-secondary">
            <div id="infoQuestao" class="padding-8">
                <span>
                    Questão atual:
                    <span id="spanNumeroDaQuestaoAtual"></span>
                    de
                    <span id="qtdQuestoes"></span>
                    questões.
                </span>
            </div>
            <div id="perguntaDaQuestaoAtual" class="padding-8">
                <span id="spanQuestaoExibida" class="text-bold"></span>
            </div>
            <div id="infoAlternativas" class="padding-8">
                <span><em>Escolha uma opção:</em></span>
            </div>
            <div id="opcoes" class="flex-colunar padding-8">
                <span>
                    <input type="radio" id="primeiraOpcao" name="option" value="alternativaA" />
                    <label for="primeiraOpcao" id="labelOpcaoUm"></label>
                </span>
                <span>
                    <input type="radio" id="segundaOpcao" name="option" value="alternativaB" />
                    <label for="segundaOpcao" id="labelOpcaoDois"></label>
                </span>
                <span>
                    <input type="radio" id="terceiraOpcao" name="option" value="alternativaC" />
                    <label for="terceiraOpcao" id="labelOpcaoTres"></label>
                </span>
                <span>
                    <input type="radio" id="quartaOpcao" name="option" value="alternativaD" />
                    <label for="quartaOpcao" id="labelOpcaoQuatro"></label>
                </span>
            </div>
            <div id="botoes" class="flex-colunar padding-8">
                <button onclick="submeter()" id="btnSubmeter">
                    Submeter resposta
                </button>
                <button onclick="avancar()" id="btnProx" disabled>
                    Próxima questão
                </button>
                <button onclick="tentarNovamente()" id="btnTentarNovamente" style="display: none;">
                    Tentar novamente
                </button>
            </div>
        </div>
        <div id="pontuacao" class="flex-colunar width-fit-content border-primary">
            <div id="pontuacaoDuranteJogo" class="flex-colunar padding-8">
                <span>Acertos: <span id="spanCertas"></span></span>
                <span>Erros: <span id="spanErradas"></span></span>
            </div>
            <div id="pontuacaoFinalJogo" class="flex-colunar padding-8">
                <span id="pontuacaoFinal">
                    Pontuação Final:
                    <span id="spanPontuacaoFinal">0</span>
                </span>
                <span id="msgFinal"></span>
            </div>
        </div>
    </div>
</body>

</html>

<script>
    const listaDeQuestoes = [
        {
            pergunta: "Qual o nome da cidade onde se passa Stranger Things?",
            alternativaA: "Hawkins",
            alternativaB: "Springfield",
            alternativaC: "Riverdale",
            alternativaD: "Las Vegas",
            alternativaCorreta: "alternativaA"
        },

        {
            pergunta: "Qual jogo os amigos costumam jogar juntos?",
            alternativaA: "Monopoly",
            alternativaB: "Xadrez",
            alternativaC: "Dungeons & Dragons",
            alternativaD: "Uno",
            alternativaCorreta: "alternativaC"
        },

        {
            pergunta: "Qual é o nome do mundo paralelo da série?",
            alternativaA: "Mundo Invertido",
            alternativaB: "Submundo",
            alternativaC: "Dimensão Sombria",
            alternativaD: "Vale das Sombras",
            alternativaCorreta: "alternativaA"
        },

        {
            pergunta: "Qual personagem possui poderes telecinéticos?",
            alternativaA: "Max",
            alternativaB: "Nancy",
            alternativaC: "Eleven",
            alternativaD: "Robin",
            alternativaCorreta: "alternativaC"
        },

        {
            pergunta: "Quem desaparece no início da primeira temporada?",
            alternativaA: "Dustin",
            alternativaB: "Mike",
            alternativaC: "Lucas",
            alternativaD: "Will",
            alternativaCorreta: "alternativaD"
        },

        {
            pergunta: "Qual é o nome do monstro da primeira temporada?",
            alternativaA: "Vecna",
            alternativaB: "Demogorgon",
            alternativaC: "Mind Flayer",
            alternativaD: "Shadow",
            alternativaCorreta: "alternativaB"
        },

        {
            pergunta: "Qual comida Eleven ama?",
            alternativaA: "Pizza",
            alternativaB: "Hambúrguer",
            alternativaC: "Waffles",
            alternativaD: "Sorvete",
            alternativaCorreta: "alternativaC"
        },

        {
            pergunta: "Quem é o chefe de polícia de Hawkins?",
            alternativaA: "Hopper",
            alternativaB: "Steve",
            alternativaC: "Jonathan",
            alternativaD: "Murray",
            alternativaCorreta: "alternativaA"
        },

        {
            pergunta: "Quais personagens trabalham na Scoops Ahoy?",
            alternativaA: "Nancy e Jonathan",
            alternativaB: "Steve e Robin",
            alternativaC: "Dustin e Lucas",
            alternativaD: "Mike e Max",
            alternativaCorreta: "alternativaB"
        },

        {
            pergunta: "Quem é o principal vilão da quarta temporada?",
            alternativaA: "Demogorgon",
            alternativaB: "Mind Flayer",
            alternativaC: "Vecna",
            alternativaD: "Billy",
            alternativaCorreta: "alternativaC"
        }

    ]

    let numeroDaQuestaoAtual = 0
    let pontuacaoFinal = 0
    let certas = 0
    let erradas = 0
    let quantidadeDeQuestoes = listaDeQuestoes.length

    function onloadEsconder() {
        document.getElementById('pontuacao').style.display = "none"
        document.getElementById('jogo').style.display = "none"
    }

    function iniciarQuiz() {
        document.getElementById('pontuacao').style.display = "flex"
        document.getElementById('jogo').style.display = "flex"
        document.getElementById('btnIniciarQuiz').style.display = "none"

        document.getElementById('qtdQuestoes').innerHTML = quantidadeDeQuestoes

        preencherHTMLcomQuestaoAtual(0)

        btnSubmeter.disabled = false
        btnProx.disabled = true
    }

    function preencherHTMLcomQuestaoAtual(index) {

        habilitarAlternativas(true)
        const questaoAtual = listaDeQuestoes[index]
        numeroDaQuestaoAtual = index
        document.getElementById("spanNumeroDaQuestaoAtual").innerHTML = index + 1
        document.getElementById("spanQuestaoExibida").innerHTML = questaoAtual.pergunta
        document.getElementById("labelOpcaoUm").innerHTML = questaoAtual.alternativaA
        document.getElementById("labelOpcaoDois").innerHTML = questaoAtual.alternativaB
        document.getElementById("labelOpcaoTres").innerHTML = questaoAtual.alternativaC
        document.getElementById("labelOpcaoQuatro").innerHTML = questaoAtual.alternativaD
    }

    function submeter() {
        const options = document.getElementsByName("option")

        let hasChecked = false
        for (let i = 0; i < options.length; i++) {
            if (options[i].checked) {
                hasChecked = true
                break
            }
        }

        if (!hasChecked) {
            alert("Escolha uma alternativa!")
        } else {
            btnSubmeter.disabled = true
            btnProx.disabled = false

            habilitarAlternativas(false)

            checarResposta()
        }
    }

    function habilitarAlternativas(valor) {
        primeiraOpcao.disabled = !valor
        segundaOpcao.disabled = !valor
        terceiraOpcao.disabled = !valor
        quartaOpcao.disabled = !valor
    }

    function avancar() {
        btnProx.disabled = true
        btnSubmeter.disabled = false

        desmarcarRadioButtons()

        if (numeroDaQuestaoAtual < quantidadeDeQuestoes - 1) {
            preencherHTMLcomQuestaoAtual(numeroDaQuestaoAtual + 1)
        } else {
            finalizarJogo()
        }
        limparCoresBackgroundOpcoes()
    }

    function checarResposta() {
        const questaoAtual = listaDeQuestoes[numeroDaQuestaoAtual]
        const respostaQuestaoAtual = questaoAtual.alternativaCorreta

        const options = document.getElementsByName("option")

        let alternativaCorreta = null
        options.forEach((option) => {
            if (option.value === respostaQuestaoAtual) {
                alternativaCorreta = option.labels[0].id
            }
        })

        options.forEach((option) => {
            if (option.checked === true && option.value === respostaQuestaoAtual) {
                document.getElementById(alternativaCorreta).classList.add("text-success-with-bg")
                pontuacaoFinal++
                certas++
                document.getElementById("spanCertas").innerHTML = certas
            } else if (option.checked && option.value !== respostaQuestaoAtual) {
                const wrongLabelId = option.labels[0].id

                document.getElementById(wrongLabelId).classList.add("text-danger-with-bg")
                document.getElementById(alternativaCorreta).classList.add("text-success-with-bg")
                erradas++
                document.getElementById("spanErradas").innerHTML = erradas
            }
        })
    }

    function limparCoresBackgroundOpcoes() {
        const options = document.getElementsByName("option")
        options.forEach((option) => {
            document.getElementById(option.labels[0].id).classList.remove("text-danger-with-bg")
            document.getElementById(option.labels[0].id).classList.remove("text-success-with-bg")
        })
    }

    function desmarcarRadioButtons() {
        const options = document.getElementsByName("option")
        for (let i = 0; i < options.length; i++) {
            options[i].checked = false
        }
    }

    function finalizarJogo() {
        let textoFinal = ""
        const porcentagem = pontuacaoFinal / quantidadeDeQuestoes

        if (porcentagem <= 0.3) {
            textoFinal = "Você foi derrotado pelo Vecna :()"
        } else if (porcentagem < 0.9) {
            textoFinal = "Nada mal! Hawkins se orgulha de você 👀"
        } else {
            textoFinal = "Você zerou o quiz!"
        }

        textoFinal += "<br>Você acertou " + Math.round(porcentagem * 100) + "%"

        document.getElementById("msgFinal").innerHTML = textoFinal
        document.getElementById("spanPontuacaoFinal").innerHTML = pontuacaoFinal

        btnSubmeter.disabled = true
        btnProx.disabled = true

        var idUsuario = sessionStorage.ID_USUARIO;

        fetch("/quiz/salvarPontuacao", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                idUsuarioServer: idUsuario,
                totalAcertosServer: pontuacaoFinal,
                totalPerguntasServer: quantidadeDeQuestoes
            })
        })
            .then(function (resposta) {
                if (resposta.ok) {
                    console.log("Pontuação salva com sucesso!");
                } else {
                    console.log("Erro ao salvar pontuação.");
                }
            })
            .catch(function (erro) {
                console.log("Erro:", erro);
            });

        document.getElementById("btnTentarNovamente").style.display = "block"
    }

    function tentarNovamente() {
        window.location.reload()
    }

</script>
