<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Upside Down | Cadastro</title>
  <script src="./js/sessao.js"></script>
  <link rel="stylesheet" href="./css/estilo.css" />
  <link rel="icon" href="./assets/icon/favicon2.ico" />
  <link rel="preconnect" href="https://fonts.gstatic.com" />
</head>

<body>
  <div class="header">
    <div class="container">
      <h1 class="titulo">The Upside Down</h1>
      <ul class="navbar">
        <li><a href="index.html">Home</a></li>
        <li><a href="quiz.html">Quiz</a></li>
        <li>|</li>
        <li><a href="login.html">Login</a></li>
        <li class="agora"><a href="#">Cadastro</a></li>
      </ul>
    </div>
  </div>

  <div class="login">
    <div class="alerta_erro">
      <div class="card_erro" id="cardErro">
        <span id="mensagem_erro"></span>
      </div>
    </div>
    <div class="container">
      <div class="card card-cadastro">
        <p class="cidade">Hawkins, Indiana</p>
        <h2>Entrar no grupo</h2>
        <p class="descricao">Crie sua conta para explorar o Mundo Invertido</p>
        <div class="formulario">
          <div class="campo">
            <span>Nome:</span>
            <input id="nome_input" type="text" placeholder="Seu nome" />
          </div>
          <div class="campo">
            <span>E-mail:</span>
            <input id="email_input" type="email" placeholder="meuemail@tud.com" />
          </div>
          <div class="campo">
            <span>Senha:</span>
            <input id="senha_input" type="password" placeholder="******" />
          </div>
          <div class="campo">
            <span>Confirmação da Senha:</span>
            <input id="confirmacao_senha_input" type="password" placeholder="******" />
          </div>

          <p class="rotulo">Sua temporada favorita</p>
          <div class="grade-temporadas">
            <button type="button" class="temporada" onclick="escolher(this, 1)">Temporada 1</button>
            <button type="button" class="temporada" onclick="escolher(this, 2)">Temporada 2</button>
            <button type="button" class="temporada" onclick="escolher(this, 3)">Temporada 3</button>
            <button type="button" class="temporada" onclick="escolher(this, 4)">Temporada 4</button>
            <button type="button" class="temporada temporada-ultima" onclick="escolher(this, 5)">Temporada 5</button>
          </div>

          <p class="texto-login">Já tem conta? <a href="login.html">Fazer login</a></p>
          <button type="button" class="botao" onclick="cadastrar()">Cadastrar</button>
        </div>

        <div id="div_aguardar" class="loading-div">
          <img src="./assets/circle-loading.gif" id="loading-gif" />
        </div>
        <div id="div_erros_login"></div>
      </div>
    </div>
  </div>

  <div class="footer">
    <div class="container">
      <h4>Feito com amor por Júlia Lemos &hearts; SPTech &copy; 2026</h4>
    </div>
  </div>
</body>

</html>

<script>
  var temporadaSelecionada = null;

  function escolher(btn, idTemporada) {
    document.querySelectorAll(".temporada").forEach(function (b) {
      b.classList.remove("selecionado");
    });
    btn.classList.add("selecionado");
    temporadaSelecionada = idTemporada;
  }

  function cadastrar() {
    var nomeVar = document.getElementById("nome_input").value;
    var emailVar = document.getElementById("email_input").value;
    var senhaVar = document.getElementById("senha_input").value;
    var confirmacaoSenhaVar = document.getElementById("confirmacao_senha_input").value;

    // Verificando se há algum campo em branco
    if (nomeVar == "" || emailVar == "" || senhaVar == "" || confirmacaoSenhaVar == "") {
      cardErro.style.display = "block";
      mensagem_erro.innerHTML = "Preencha todos os campos!";
      return false;
    }

    // Verificando se as senhas são iguais
    if (senhaVar !== confirmacaoSenhaVar) {
      cardErro.style.display = "block";
      mensagem_erro.innerHTML = "As senhas não são as mesmas!";
      return false;
    }

    setInterval(sumirMensagem, 5000);

    fetch("/usuarios/cadastrar", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        nomeServer: nomeVar,
        emailServer: emailVar,
        senhaServer: senhaVar,
        idTemporadaFavoritaServer: temporadaSelecionada
      }),
    })
      .then(function (resposta) {
        if (resposta.ok) {
          cardErro.style.display = "block";
          mensagem_erro.innerHTML = "Cadastro realizado! Redirecionando para o login...";
          setTimeout(function () {
            window.location = "login.html";
          }, 2000);
        } else {
          resposta.text().then(function (texto) {
            cardErro.style.display = "block";
            mensagem_erro.innerHTML = texto || "Erro ao cadastrar!";
          });
        }
      })
      .catch(function (erro) {
        console.log("#ERRO: " + erro);
        cardErro.style.display = "block";
        mensagem_erro.innerHTML = "Erro de conexão com o servidor.";
      });

    return false;
  }

  function sumirMensagem() {
    cardErro.style.display = "none";
  }
</script>
